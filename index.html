<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f3ede1" />
    <meta name="description" content="Bruno Luiz — música, terapia e criação digital. Escolha entre viver a experiência da improvisação terapêutica ou criar um site sob medida." />
    <meta name="author" content="Bruno Luiz" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bruno Luiz — Do que você sente ao que o mundo vê" />
    <meta property="og:description" content="Música, terapia e criação digital." />
    <meta property="og:locale" content="pt_BR" />

    <title>Bruno Luiz — Do que você sente ao que o mundo vê</title>

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23f3ede1'/%3E%3Ctext x='50%25' y='62%25' text-anchor='middle' font-family='Georgia, serif' font-weight='300' font-size='34' fill='%231a1714'%3EBL%3C/text%3E%3C/svg%3E" />

    <!-- Tipografia: Cinzel (display monumental, inspirada em inscrições romanas)
         + Fraunces italic (tagline fluida) + Inter Tight (corpo legível). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,400&family=Inter+Tight:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <!-- Textura de grão sutil sobre toda a página (atmosfera de papel) -->
    <div class="grain" aria-hidden="true"></div>

    <main class="page">
      <article class="hero" aria-labelledby="nome">
        <!-- Monograma + linha decorativa no topo -->
        <header class="mark" data-anim="1" aria-hidden="true">
          <span class="mark__line"></span>
          <span class="mark__monogram">BL</span>
          <span class="mark__line"></span>
        </header>

        <p class="eyebrow" data-anim="2">presença · escuta · criação</p>

        <h1 id="nome" class="name" data-anim="3">Bruno Luiz</h1>

        <!-- Ornamento entre nome e tagline -->
        <div class="ornament" data-anim="4" aria-hidden="true">
          <span class="ornament__line"></span>
          <span class="ornament__diamond">◆</span>
          <span class="ornament__line"></span>
        </div>

        <p class="tagline" data-anim="5">Do que você sente ao que o mundo vê</p>

        <p class="lead" data-anim="6">Música, terapia e criação digital.</p>

        <nav class="cta" aria-label="Escolha seu caminho" data-anim="7">
          <!-- Caminho 1: Musicoterapia / improvisação terapêutica -->
          <div class="cta__group">
            <span class="cta__tag">Musicoterapia</span>
            <!-- ALTERAR AQUI: link do site da experiência -->
            <a class="btn btn--primary" href="https://www.brunoluizmt.com.br" target="_blank" rel="noopener">
              <span class="btn__label">Quero viver a experiência da improvisação terapêutica</span>
              <span class="btn__arrow" aria-hidden="true">→</span>
            </a>
          </div>

          <!-- Caminho 2: Criação digital / portfólio -->
          <div class="cta__group">
            <span class="cta__tag">Criação digital</span>
            <!-- ALTERAR AQUI: link do portfólio -->
            <a class="btn btn--ghost" href="https://www.brunoluisportfolio.com.br" target="_blank" rel="noopener">
              <span class="btn__label">Quero criar um site</span>
              <span class="btn__arrow" aria-hidden="true">→</span>
            </a>
          </div>
        </nav>
      </article>
    </main>

    <footer class="footer" data-anim="8">
      <span class="footer__copy">© Bruno Luiz · 2026</span>
      <span class="footer__sep" aria-hidden="true">—</span>
      <!-- ALTERAR AQUI: handle do Instagram -->
      <a class="footer__link" href="https://instagram.com/brunoluiz.musicoterapia" target="_blank" rel="noopener" aria-label="Instagram @brunoluiz.musicoterapia">
        Instagram
      </a>
    </footer>

  </body>
</html>
